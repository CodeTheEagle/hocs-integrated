<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOCS Portal | Secure Access</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body class="portal-body">
    <div id="authLayer" class="auth-container">
        <img src="logo.jpg" class="auth-logo" alt="HOCS">
        <h2>Engineering Access</h2>
        <p>HOCS Internal telemetry verilerine erişim için kimlik doğrulaması gereklidir.</p>
        <button id="loginBtn" class="btn-google">Google ID ile Giriş Yap</button>
    </div>

    <div id="mainSystem" style="display: none;" class="system-grid">
        <aside class="sidebar">
            <img src="logo.jpg" alt="HOCS">
            <nav class="side-nav">
                <button class="active">Genel Bakış</button>
                <button>Sipariş Yönetimi</button>
                <button onclick="location.reload()">Güvenli Çıkış</button>
            </nav>
        </aside>
        <main class="content">
            <header><h2>Telemetri Merkezi</h2><div class="status-live">● LIVE_FEED_ADIYAMAN</div></header>
            <div class="stats">
                <div class="card"><label>Throughput</label><div class="val count" data-target="4.14">0</div><span>TB/s</span></div>
                <div class="card"><label>Satış Hedefi (BBN)</label><div class="val count" data-target="11.13">0</div><span>Units</span></div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
