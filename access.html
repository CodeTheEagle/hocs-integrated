<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | HOCS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="index.html"><img src="logo.jpg" style="height:40px; margin-bottom:40px;"></a>
            <p style="font-weight:600; color:var(--accent);">● Canlı Veri Akışı</p>
            <p style="margin-top:15px; color:#666;">Donanım Sağlığı</p>
            <a href="index.html" style="display:block; margin-top:50px; color:red; font-size:0.9rem;">Çıkış Yap</a>
        </aside>
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h1>Mühendislik Paneli</h1>
                <span style="font-family:'JetBrains Mono'; color:#34c759;">ONLINE: ADY_HQ</span>
            </header>
            <div class="grid-2">
                <div class="card"><strong>Throughput</strong><h1 style="font-size:3rem;"><span class="counter-val">4.14</span> TB/s</h1></div>
                <div class="card"><strong>Gecikme</strong><h1 style="font-size:3rem;">&lt; 1 ns</h1></div>
            </div>
            <div style="background:#1c1c1e; color:#34c759; padding:20px; border-radius:12px; margin-top:30px; font-family:'JetBrains Mono'; font-size:0.8rem;">
                <div>[14:15:02] INITIALIZING XILINX KRIA K26... OK</div>
                <div>[14:15:05] OPTIC_LINK: ACTIVE (4.14 TB/s)</div>
                <div style="color:#fff;">[14:15:10] STREAMING DATA...</div>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
