<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Portal | HOCS Integrated</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505; --bg-card: #09090b; --text-primary: #ffffff;
            --text-secondary: #a1a1aa; --border-color: #27272a; --accent-cyan: #00f2fe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .login-wrapper { width: 100%; max-width: 420px; padding: 24px; }
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 40px; }
        .logo-box img { height: 40px; }

        .login-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .badge { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 16px; letter-spacing: 1px; }
        .login-card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 32px; }

        .btn-google { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; background: #ffffff; color: #000000; border: none; padding: 14px; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-google:hover { background: #e4e4e7; }
        .btn-google img { height: 20px; }

        .back-link { display: inline-block; margin-top: 32px; color: var(--text-secondary); font-size: 0.9rem; transition: 0.2s; }
        .back-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="logo-box">
            <img src="logo.png" alt="HOCS">
            HOCS INTEGRATED
        </div>

        <div class="login-card">
            <span class="badge">RESTRICTED SYSTEM</span>
            <h1>Engineering Portal</h1>
            <p>Access requires an authorized @hocsintegrated.com employee workspace account.</p>

            <button class="btn-google" onclick="alert('ERROR 403: Access Denied. Your IP and attempt have been logged. Please use an authorized HOCS Workspace account.')">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                Sign in with Workspace
            </button>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-link">&larr; Return to Public Site</a>
        </div>
    </div>

</body>
</html>
