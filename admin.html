<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal | HOCS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #f5f5f7; --text-primary: #1d1d1f; --text-secondary: #86868b; --accent-blue: #0066cc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg-primary); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .portal-wrapper { width: 100%; max-width: 440px; padding: 30px; animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box { display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: 600; font-size: 1.2rem; margin-bottom: 40px; letter-spacing: -0.5px; }
        .logo-box img { height: 40px; }

        .login-card { background: #ffffff; border-radius: 24px; padding: 48px 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.04); text-align: center; border: 1px solid #e5e5ea; }
        .login-card h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.5px; }
        .login-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 40px; line-height: 1.5; }

        .btn-sso { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; background: #ffffff; color: var(--text-primary); border: 1px solid #d2d2d7; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-sso:hover { background: #f5f5f7; border-color: #86868b; }
        .btn-sso img { height: 20px; }

        .back-link { display: inline-block; margin-top: 30px; color: var(--text-secondary); font-size: 0.9rem; transition: 0.2s; }
        .back-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>

    <div class="portal-wrapper">
        <div class="logo-box">
            <img src="logo.jpg" alt="HOCS">
            HOCS INTEGRATED
        </div>

        <div class="login-card">
            <h1>Workspace Login</h1>
            <p>This portal is restricted to authorized HOCS Integrated personnel. External IP access attempts are logged.</p>

            <button class="btn-sso" onclick="alert('Authentication Error: Invalid token or unauthorized IP footprint. Please contact HOCS IT Support.')">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="G">
                Continue with Corporate ID
            </button>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="back-link">Return to Public Site</a>
        </div>
    </div>

</body>
</html>
