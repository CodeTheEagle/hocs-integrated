<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOCS Integrated</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo"><img src="logo.jpg" alt="HOCS"> HOCS INTEGRATED</a>
        <div class="nav-links">
            <a href="index.html" class="active-link">Home</a>
            <a href="technology.html">Technology</a>
            <a href="team.html">Team</a>
            <a href="portal.html" style="color:var(--accent); font-weight:600;">Partner Portal</a>
        </div>
    </nav>

    <header class="hero-simple">
        <div class="reveal">
            <h1 class="hero-title">Breaking the Thermal Wall.</h1>
            <p style="color:var(--text-muted); font-size:1.2rem; margin-bottom:30px;">4.14 TB/s zero-latency optical hardware architecture.</p>
            <div class="metrics">
                <div class="m-item"><strong><span class="counter-val">4.14</span></strong> TB/s</div>
                <div class="m-item"><strong>&lt; 1</strong> ns Latency</div>
            </div>
            <a href="#contact" class="btn-primary">Join Waitlist</a>
        </div>
        <div class="reveal"><img src="Micro-Nanoscale-Fabrication-Engineering_CHEMENG440.jpg" style="width:100%; border-radius:20px;"></div>
    </header>

    <section id="contact" style="padding:100px 8%; background:var(--surface);">
        <div class="reveal" style="max-width:500px; margin:0 auto; background:#fff; padding:50px; border-radius:30px; border:1px solid var(--border)!important;">
            <h2 style="text-align:center; margin-bottom:30px;">PoC & Dev-Kit Request</h2>
            <form action="https://formspree.io/f/mrejkoky" method="POST" style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" name="name" placeholder="Full Name" required style="padding:15px; background:var(--surface); border-radius:8px;">
                <input type="email" name="email" placeholder="Email Address" required style="padding:15px; background:var(--surface); border-radius:8px;">
                <button type="submit" class="btn-primary">Submit Application</button>
            </form>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
