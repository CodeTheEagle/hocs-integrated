<!DOCTYPE html>
<html lang="tr">
<head>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-logo"><img src="logo.jpg" alt="HOCS"> HOCS INTEGRATED</div>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>

            <a href="team.html">Ekip</a>
            <a href="portal.html" class="btn-portal">Partner Access</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="reveal">Breaking the Thermal Wall.</h1>
            <p class="reveal">4.14 TB/s hızında optik veri iletimi ile yeni nesil AI sunucu mimarisi.</p>
            <div class="metrics reveal">
                <div class="metric-item"><span>4.14</span><small>TB/s</small></div>
                <div class="metric-item"><span>&lt;1</span><small>ns Latency</small></div>
            </div>
            <a href="#waitlist" class="btn-primary reveal">Dev-Kit Bekleme Listesine Katıl</a>

    <section id="waitlist" class="waitlist-section">

            <form action="https://formspree.io/f/mrejkoky" method="POST">
                <input type="text" name="Company" placeholder="Kurum Adı" required>
                <input type="email" name="Email" placeholder="Kurumsal E-posta" required>
                <textarea name="Message" placeholder="Projenizden bahsedin..." rows="4"></textarea>
                <button type="submit" class="btn-submit">Talep Gönder</button>
            </form>
        </div>
    </section>

    <script src="js/main.js"></script>
